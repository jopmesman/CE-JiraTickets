<html>
    <head>
        <title>Jira Options</title>
        <style>
            body {
                margin: 0;
                padding: 0;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                background: #f4f5f7;
                color: #172b4d;
            }

            .app-shell {
                display: flex;
                flex-direction: column;
                min-height: 100vh;
            }

            .app-header {
                background: #0747a6;
                color: #ffffff;
                padding: 12px 24px;
                display: flex;
                align-items: center;
                box-shadow: 0 1px 0 rgba(9, 30, 66, 0.25);
            }

            .app-header__logo {
                width: 24px;
                height: 24px;
                border-radius: 4px;
                background: linear-gradient(135deg, #0052cc, #2684ff);
                margin-right: 10px;
            }

            .app-header__title {
                font-size: 16px;
                font-weight: 500;
            }

            .app-content {
                display: flex;
                justify-content: center;
                padding: 32px 16px;
            }

            .card {
                background: #ffffff;
                border-radius: 3px;
                box-shadow: 0 1px 3px rgba(9, 30, 66, 0.25);
                padding: 24px 24px 20px;
                max-width: 480px;
                width: 100%;
            }

            .card__title {
                font-size: 18px;
                font-weight: 500;
                margin: 0 0 4px;
            }

            .card__description {
                font-size: 12px;
                color: #6b778c;
                margin: 0 0 16px;
            }

            .field {
                margin-bottom: 16px;
            }

            .field label {
                display: block;
                font-size: 12px;
                font-weight: 600;
                color: #42526e;
                margin-bottom: 4px;
            }

            .field input[type="text"],
            .field input[type="url"],
            .field input {
                width: 100%;
                box-sizing: border-box;
                padding: 6px 8px;
                border-radius: 3px;
                border: 1px solid #dfe1e6;
                font-size: 14px;
                outline: none;
                transition: border-color 0.2s ease, box-shadow 0.2s ease;
            }

            .field input:focus {
                border-color: #2684ff;
                box-shadow: 0 0 0 2px rgba(38, 132, 255, 0.3);
            }

            .helper-text {
                font-size: 11px;
                color: #6b778c;
                margin-top: 4px;
            }

            .actions {
                display: flex;
                justify-content: flex-end;
                align-items: center;
                gap: 8px;
            }

            #save {
                background-color: #0052cc;
                border: none;
                color: #ffffff;
                border-radius: 3px;
                padding: 6px 14px;
                font-size: 14px;
                font-weight: 500;
                cursor: pointer;
                transition: background-color 0.2s ease, box-shadow 0.2s ease;
            }

            #save:hover {
                background-color: #0747a6;
                box-shadow: 0 1px 2px rgba(9, 30, 66, 0.25);
            }

            #save:active {
                background-color: #0052cc;
                box-shadow: none;
            }

            #status {
                font-size: 12px;
                color: #36b37e;
            }
        </style>
    </head>
    <body>
        <div class="app-shell">
            <header class="app-header">
                <div class="app-header__logo"></div>
                <div class="app-header__title">JiraTickets - Options</div>
            </header>
            <main class="app-content">
                <section class="card">
                    <h1 class="card__title">Jira base URL</h1>
                    <p class="card__description">
                        Configure the base URL that will be used to open Jira issues from the extension.
                    </p>

                    <div class="field">
                        <label for="url">URL</label>
                        <input id="url" type="text" placeholder="e.g. https://jira.yourcompany.com/browse/" />
                        <div class="helper-text">
                            Use the base URL up to, and including, the part before the issue key.
                        </div>
                    </div>

                    <div class="actions">
                        <div id="status"></div>
                        <button id="save">Save</button>
                    </div>
                </section>
            </main>
        </div>
    </body>
    <script src="options.js"></script>
</html>
